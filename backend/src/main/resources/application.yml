spring:
  application:
    name: gochubat
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  access-expiration: 1800000
  refresh-expiration: 1209600000

gochubat:
  point:
    post-created: 10
    comment-created: 2
    like-received: 1
    pepper-threshold: 100
    corn-threshold: 500
  cors:
    allowed-origins: http://localhost:5173
  upload:
    dir: ./uploads
    max-size-bytes: 10485760
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
    public-base-url: /uploads

naver:
  authorize-base-url: https://nid.naver.com/oauth2.0/authorize
  token-base-url: https://nid.naver.com/oauth2.0/token
  user-info-base-url: https://openapi.naver.com/v1/nid/me
  success-redirect-url: http://localhost:5173/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.gochubat: INFO
