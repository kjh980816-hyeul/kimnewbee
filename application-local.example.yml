# 백엔드 로컬 환경 설정 예시
# 이 파일은 git에 commit. 실제 값이 들어간 application-local.yml은 .gitignore.
# 사용 방법: 이 파일을 application-local.yml로 복사하고 실제 값으로 바꾸기.

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gochubat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: __DB_사용자명__
    password: __DB_비밀번호__
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

naver:
  client-id: __네이버_Client_ID__
  client-secret: __네이버_Client_Secret__
  callback-url: http://localhost:8080/api/auth/naver/callback
  success-redirect-url: http://localhost:5173/

jwt:
  secret: __64자_이상_랜덤_문자열__
  access-expiration: 1800000      # 30분 (ms)
  refresh-expiration: 1209600000  # 14일 (ms)

logging:
  level:
    com.gochubat: DEBUG
    org.springframework.security: DEBUG
